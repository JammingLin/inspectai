<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InspectAI — My Reports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080c10; --bg2: #0d1117; --surface: #111820; --border: #1e2d3d;
      --accent: #00d4ff; --accent2: #00ff9d; --warn: #ff6b35; --text: #e2e8f0; --muted: #64748b;
      --font-display: 'Outfit', sans-serif; --font-mono: 'JetBrains Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-display); overflow-x: hidden; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between; padding: 20px 48px;
      background: rgba(8,12,16,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
    }
    .logo { font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
    .logo span { color: var(--accent2); }
    nav a { font-family: var(--font-mono); font-size: 12px; color: var(--muted); text-decoration: none; letter-spacing: 1px; text-transform: uppercase; transition: color 0.2s; }
    nav a:hover { color: var(--accent); }
    .container { max-width: 1200px; margin: 0 auto; padding: 120px 24px 60px; position: relative; z-index: 1; }
    h1 { font-size: 36px; font-weight: 800; margin-bottom: 12px; }
    .subtitle { color: var(--muted); font-size: 16px; margin-bottom: 32px; }
    
    .btn {
      padding: 14px 28px; border-radius: 8px; font-family: var(--font-mono); font-size: 14px;
      font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
      border: none; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2)); color: var(--bg);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,212,255,0.3); }
    .btn-secondary {
      background: transparent; border: 1px solid var(--accent); color: var(--accent);
    }
    .btn-secondary:hover { background: var(--accent); color: var(--bg); }
    .btn-danger {
      background: transparent; border: 1px solid var(--warn); color: var(--warn);
    }
    .btn-danger:hover { background: var(--warn); color: white; }
    
    /* Reports Grid */
    .reports-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 24px;
      margin-top: 32px;
    }
    .report-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      transition: all 0.2s;
    }
    .report-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .report-address {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }
    .report-date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
    }
    .report-inspector {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .report-stats {
      display: flex;
      gap: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .stat {
      text-align: center;
    }
    .stat-num {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 700;
      display: block;
    }
    .stat-num.critical { color: var(--warn); }
    .stat-num.moderate { color: #ffc107; }
    .stat-num.minor { color: var(--accent2); }
    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .report-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }
    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    .empty-state-actions {
      margin-top: 24px;
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    
    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    @media (max-width: 640px) {
      .reports-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">Inspect<span>AI</span></div>
    <div class="nav-links">
      <a href="app.html">Create Report</a>
      <a href="index.html">← Back to Home</a>
    </div>
  </nav>

  <div class="container">
    <h1>My Reports</h1>
    <p class="subtitle">View and manage your saved inspection reports.</p>
    
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <div>Loading your reports...</div>
    </div>
    
    <div id="emptyState" class="empty-state" style="display: none;">
      <div class="empty-state-icon">📋</div>
      <h2>No reports yet</h2>
      <p style="margin-top: 12px;">Create your first inspection report to see it here.</p>
      <div class="empty-state-actions">
        <a href="app.html" class="btn btn-primary">Create Report →</a>
      </div>
    </div>
    
    <div id="reportsGrid" class="reports-grid" style="display: none;"></div>
  </div>

  <script>
    // IndexedDB helpers
    const DB_NAME = 'InspectAI';
    const DB_VERSION = 1;
    const STORE_NAME = 'reports';
    
    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: 'id' });
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }
    
    async function getAllReports() {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.getAll();
        request.onsuccess = () => resolve(request.result || []);
        request.onerror = () => reject(request.error);
      });
    }
    
    async function deleteReport(id) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const request = store.delete(id);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }
    
    async function loadReports() {
      try {
        const reports = await getAllReports();
        reports.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        
        document.getElementById('loading').style.display = 'none';
        
        if (reports.length === 0) {
          document.getElementById('emptyState').style.display = 'block';
          return;
        }
        
        document.getElementById('reportsGrid').style.display = 'grid';
        document.getElementById('reportsGrid').innerHTML = reports.map(report => `
          <div class="report-card">
            <div class="report-header">
              <div>
                <div class="report-address">${report.propertyInfo?.address || 'Unknown Address'}</div>
                <div class="report-date">${new Date(report.createdAt).toLocaleDateString()}</div>
              </div>
            </div>
            <div class="report-inspector">Inspector: ${report.propertyInfo?.inspectorName || 'Unknown'}</div>
            <div class="report-stats">
              <div class="stat">
                <span class="stat-num critical">${report.severityCounts?.critical || 0}</span>
                <span class="stat-label">Critical</span>
              </div>
              <div class="stat">
                <span class="stat-num moderate">${report.severityCounts?.moderate || 0}</span>
                <span class="stat-label">Moderate</span>
              </div>
              <div class="stat">
                <span class="stat-num minor">${report.severityCounts?.minor || 0}</span>
                <span class="stat-label">Minor</span>
              </div>
              <div class="stat">
                <span class="stat-num" style="color: var(--text)">${report.totalIssues || 0}</span>
                <span class="stat-label">Total</span>
              </div>
            </div>
            <div class="report-actions">
              <button class="btn btn-secondary" onclick="viewReport('${report.id}')">👁️ View</button>
              <button class="btn btn-danger" onclick="confirmDelete('${report.id}')">🗑️ Delete</button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Load reports error:', error);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('emptyState').style.display = 'block';
        document.querySelector('#emptyState h2').textContent = 'Error loading reports';
        document.querySelector('#emptyState p').textContent = error.message;
      }
    }
    
    function viewReport(reportId) {
      alert(`View report: ${reportId}\n\n(Full report viewer coming soon)`);
    }
    
    async function confirmDelete(reportId) {
      if (confirm('Are you sure you want to delete this report? This action cannot be undone.')) {
        try {
          await deleteReport(reportId);
          alert('Report deleted successfully');
          loadReports();
        } catch (error) {
          alert('Failed to delete report: ' + error.message);
        }
      }
    }
    
    // Load reports on page load
    loadReports();
  </script>
</body>
</html>
