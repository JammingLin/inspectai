<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing — InspectAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/theme.css" />
  <script src="/theme.js"></script>
  <script src="/auth.js"></script>
  <style>
    body { background: var(--bg); color: var(--text); font-family: var(--font-display); min-height: 100vh; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 20px 48px; background: var(--nav-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .logo { font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; text-decoration: none; }
    .pricing-container { max-width: 1100px; margin: 120px auto 100px; padding: 0 24px; text-align: center; }
    h1 { font-size: 56px; font-weight: 800; margin-bottom: 60px; letter-spacing: -1px; }
    .section-header { font-size: 32px; font-weight: 700; margin: 80px 0 40px; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 32px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px; transition: 0.3s; }
    .card:hover { border-color: var(--accent); }
    .card.pro { border: 2px solid var(--accent); }
    
    .price-big { font-size: 48px; font-weight: 800; margin: 24px 0; }
    .btn-cta { width: 100%; padding: 16px; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; font-weight: 700; cursor: pointer; text-decoration: none; display: block; }
    .btn-cta.secondary { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    
    .credit-card { background: var(--bg2); border: 1px solid var(--border); padding: 30px; border-radius: 16px; }
    .credit-cta { width: 100%; padding: 12px; border: 1px solid var(--accent2); color: var(--accent2); background: transparent; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 20px; }
  </style>
</head>
<body onload="auth.initNav()">
  <nav>
    <a href="/" class="logo">Inspect<span>AI</span></a>
    <div class="nav-links"><div id="authArea"></div></div>
  </nav>

  <div class="pricing-container">
    <h1>Pricing Plans</h1>
    <div class="grid">
      <div class="card">
        <h3>Basic</h3>
        <div class="price-big">$29</div>
        <button class="btn-cta secondary" onclick="checkout('basic')">Subscribe</button>
      </div>
      <div class="card pro">
        <h3>Pro</h3>
        <div class="price-big">$49</div>
        <button class="btn-cta" onclick="checkout('pro')">Subscribe</button>
      </div>
      <div class="card">
        <h3>Team</h3>
        <div class="price-big">$149</div>
        <button class="btn-cta secondary" onclick="checkout('team')">Contact Sales</button>
      </div>
    </div>

    <h2 class="section-header">One-time Credit Packs</h2>
    <div class="grid">
      <div class="credit-card"><h3>10 Credits</h3><button class="credit-cta" onclick="buyCredits('starter')">Buy for $10</button></div>
      <div class="credit-card"><h3>25 Credits</h3><button class="credit-cta" onclick="buyCredits('standard')">Buy for $20</button></div>
      <div class="credit-card"><h3>60 Credits</h3><button class="credit-cta" onclick="buyCredits('pro')">Buy for $40</button></div>
    </div>
  </div>

  <script>
    async function buyCredits(pack) {
        const user = auth.getUser();
        if (!user) { alert('Please sign in first'); return; }
        try {
            const res = await fetch('/api/paypal-create-order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${user.token}` },
                body: JSON.stringify({ pack }),
            });
            const data = await res.json();
            if (data.approveUrl) window.location.href = data.approveUrl;
        } catch (e) { alert('Network error'); }
    }
  </script>
</body>
</html>
